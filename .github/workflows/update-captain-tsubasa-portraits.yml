name: Update Captain Tsubasa Portraits

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: write

jobs:
  update-portraits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download portraits and update personnages.js
        run: python .github/scripts/update_ct_portraits.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add assets/images/olive-et-tom assets/js/personnages.js
          git commit -m "chore: update Captain Tsubasa portraits"
          git push origin "HEAD:${GITHUB_REF_NAME}"
