name: Sync personnages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  sync:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: python .github/scripts/sync_personnages.py

      - run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git diff --cached --quiet || git commit -m "Sync personnages"

          git push
