name: Sync entities

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run sync script
        run: python scripts/sync_entities.py

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          for file in assets/data/personnages.json assets/data/equipes.json assets/data/techniques.json; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done

          git diff --cached --quiet || git commit -m "Sync entities data"
          git push
