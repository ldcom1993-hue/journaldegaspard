name: Sync Captain Tsubasa characters

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq


      - name: Create folders
        run: |
          mkdir -p assets/images/olive-et-tom
          mkdir -p assets/js


      - name: Fetch characters and images
        run: |

          API="https://captaintsubasa.fandom.com/api.php?action=query&list=categorymembers&cmtitle=Category:Characters&cmlimit=50&format=json"

          curl -s "$API" > characters.json


          echo "const characters = [" > assets/js/personnages.js


          jq -r '.query.categorymembers[].title' characters.json |
          while read name; do

            slug=$(echo "$name" | sed 's/ /_/g')

            echo "Processing $slug"

            IMG=$(curl -s \
            "https://captaintsubasa.fandom.com/api.php?action=query&titles=$slug&prop=pageimages&format=json&pithumbsize=800" \
            | jq -r '.query.pages[].thumbnail.source')

            file=$(echo "$slug" | tr '[:upper:]' '[:lower:]')

            if [ "$IMG" != "null" ]; then

              curl -L "$IMG" \
              -o assets/images/olive-et-tom/$file.png

              echo "{
                name: \"$name\",
                japaneseName: \"$name\",
                role: \"\",
                team: \"\",
                description: \"\",
                image: \"/assets/images/olive-et-tom/$file.png\",
                link: \"#\",
                order: 0
              }," >> assets/js/personnages.js

            fi

          done


          echo "];" >> assets/js/personnages.js


      - name: Commit
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git diff --cached --quiet || git commit -m "Sync characters and portraits"
