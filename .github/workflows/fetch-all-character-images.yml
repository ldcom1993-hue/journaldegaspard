name: Fetch Captain Tsubasa images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-images:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - run: mkdir -p assets/images/olive-et-tom

      - name: Download real character portraits
        run: |

          download() {

            page="$1"
            filename="$2"

            echo "Fetching $page"

            img=$(curl -L -A "journaldegaspard-bot" \
              "https://captaintsubasa.fandom.com/wiki/$page" \
              | grep -o 'https://static.wikia.nocookie.net[^"]*revision/latest[^"]*\.png' \
              | head -n 1)

            echo "Image found: $img"

            if [ -n "$img" ]; then

              curl -L \
                -A "journaldegaspard-bot" \
                "$img" \
                -o "assets/images/olive-et-tom/$filename"

            else

              echo "No portrait found"

            fi
          }


          download Tsubasa_Ozora olivier-atton.png
          download Genzo_Wakabayashi thomas-price.png
          download Taro_Misaki ben-becker.png
          download Kojiro_Hyuga mark-landers.png
          download Ken_Wakashimazu ed-warner.png


          ls -la assets/images/olive-et-tom


      - name: Commit and push
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git diff --cached --quiet || git commit -m "Add real portraits"
          git push
