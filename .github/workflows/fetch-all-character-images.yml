name: Fetch all character images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-images:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create image folder
        run: mkdir -p assets/images/olive-et-tom

      - name: Fetch images from Wikimedia API
        run: |

          fetch() {

            search="$1"
            filename="$2"

            echo "Searching image for $search"

            api="https://en.wikipedia.org/w/api.php?action=query&titles=$search&prop=pageimages&format=json&pithumbsize=500"

            url=$(curl -s -A "journaldegaspard-bot" "$api" \
              | jq -r '.query.pages[]?.thumbnail?.source')

            echo "Image URL: $url"

            if [ "$url" != "null" ] && [ "$url" != "" ]; then

              curl \
                -L \
                -A "journaldegaspard-bot" \
                --retry 5 \
                "$url" \
                -o "assets/images/olive-et-tom/$filename"

              file "assets/images/olive-et-tom/$filename"

            else
              echo "No image found"
            fi
          }


          fetch "Tsubasa_Ozora" "olivier-atton.jpg"
          fetch "Genzo_Wakabayashi" "thomas-price.jpg"
          fetch "Taro_Misaki" "ben-becker.jpg"
          fetch "Kojiro_Hyuga" "mark-landers.jpg"
          fetch "Ken_Wakashimazu" "ed-warner.jpg"


          ls -la assets/images/olive-et-tom

      - name: Commit and push images
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/images/olive-et-tom/

          if git diff --cached --quiet
          then
            echo "Nothing to commit"
          else
            git commit -m "Add character images"
            git push
          fi
