name: Fetch all character images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-images:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create folder
        run: mkdir -p assets/images/olive-et-tom

      - name: Search and download images
        run: |

          download() {

            query="$1"
            filename="$2"

            echo "Searching Wikipedia page for: $query"

            title=$(curl -s \
              -A "journaldegaspard-bot" \
              "https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=$query&format=json" \
              | jq -r '.query.search[0].title')

            echo "Found page: $title"

            if [ "$title" = "null" ] || [ "$title" = "" ]; then
              echo "No page found"
              return
            fi

            api="https://en.wikipedia.org/w/api.php?action=query&titles=$(echo $title | sed 's/ /_/g')&prop=pageimages&format=json&pithumbsize=600"

            url=$(curl -s -A "journaldegaspard-bot" "$api" \
              | jq -r '.query.pages[]?.thumbnail?.source')

            echo "Image URL: $url"

            if [ "$url" != "null" ] && [ "$url" != "" ]; then

              curl \
                -L \
                -A "journaldegaspard-bot" \
                --retry 5 \
                "$url" \
                -o "assets/images/olive-et-tom/$filename"

              file "assets/images/olive-et-tom/$filename"

            else
              echo "No image found"
            fi
          }


          download "Tsubasa Ozora Captain Tsubasa" "olivier-atton.jpg"
          download "Genzo Wakabayashi Captain Tsubasa" "thomas-price.jpg"
          download "Taro Misaki Captain Tsubasa" "ben-becker.jpg"
          download "Kojiro Hyuga Captain Tsubasa" "mark-landers.jpg"
          download "Ken Wakashimazu Captain Tsubasa" "ed-warner.jpg"


          ls -la assets/images/olive-et-tom

      - name: Commit and push
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/images/olive-et-tom/

          if git diff --cached --quiet
          then
            echo "Nothing to commit"
          else
            git commit -m "Add character images"
            git push
          fi
