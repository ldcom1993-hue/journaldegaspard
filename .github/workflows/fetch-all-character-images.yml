name: Fetch Captain Tsubasa images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-images:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl grep sed

      - name: Create folder
        run: mkdir -p assets/images/olive-et-tom

      - name: Download images from Captain Tsubasa Wiki
        run: |

          download() {

            page="$1"
            filename="$2"

            echo "Fetching page: $page"

            html=$(curl -L -A "journaldegaspard-bot" \
              "https://captaintsubasa.fandom.com/wiki/$page")

            img=$(echo "$html" \
              | grep -o 'https://static.wikia.nocookie.net[^"]*\.png' \
              | head -n 1)

            echo "Image URL: $img"

            if [ -n "$img" ]; then

              curl -L \
                -A "journaldegaspard-bot" \
                "$img" \
                -o "assets/images/olive-et-tom/$filename"

              file "assets/images/olive-et-tom/$filename"

            else

              echo "No image found for $page"

            fi
          }


          download "Tsubasa_Ozora" "olivier-atton.png"
          download "Genzo_Wakabayashi" "thomas-price.png"
          download "Taro_Misaki" "ben-becker.png"
          download "Kojiro_Hyuga" "mark-landers.png"
          download "Ken_Wakashimazu" "ed-warner.png"


          ls -la assets/images/olive-et-tom


      - name: Commit and push
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/images/olive-et-tom/

          if git diff --cached --quiet
          then
            echo "Nothing to commit"
          else
            git commit -m "Add Captain Tsubasa character images"
            git push
          fi
