name: Fetch all character images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create folder
        run: mkdir -p assets/images/olive-et-tom

      - name: Download images
        run: |
          set -e

          characters=(
            "Tsubasa Ozora|olivier-atton"
            "Genzo Wakabayashi|thomas-price"
            "Taro Misaki|ben-becker"
            "Kojiro Hyuga|mark-landers"
            "Ken Wakashimazu|ed-warner"
          )

          for entry in "${characters[@]}"
          do
            wiki=$(echo $entry | cut -d'|' -f1)
            file=$(echo $entry | cut -d'|' -f2)

            echo "Searching $wiki"

            url=$(curl -s \
              "https://en.wikipedia.org/api/rest_v1/page/summary/$wiki" \
              | jq -r '.thumbnail.source')

            if [ "$url" != "null" ] && [ "$url" != "" ]
            then
              echo "Downloading $file.jpg"
              curl -L "$url" \
                -o "assets/images/olive-et-tom/$file.jpg"
            else
              echo "No image found for $wiki"
            fi

          done

      - name: Show files
        run: ls -la assets/images/olive-et-tom

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/images/olive-et-tom/

          git diff --cached --quiet || git commit -m "Add character images"

          git push
