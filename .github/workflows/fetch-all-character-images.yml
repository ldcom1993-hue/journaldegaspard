name: Fetch ALL Captain Tsubasa character images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-images:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4


      - name: Create images folder
        run: mkdir -p assets/images/olive-et-tom


      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq


      - name: Extract characters and download images
        run: |

          set -e

          FILE="univers/olive-et-tom/personnages.js"

          if [ ! -f "$FILE" ]; then
            echo "personnages.js not found"
            exit 1
          fi


          echo "Extracting characters..."


          grep japaneseName "$FILE" | sed 's/.*: "//' | sed 's/",//' > names.txt
          grep link "$FILE" | sed 's/.*personnages\///' | sed 's/\.html".*//' > slugs.txt


          paste names.txt slugs.txt > characters.txt


          download() {

            japanese="$1"
            slug="$2"

            page=$(echo "$japanese" | sed 's/ /_/g')

            filename="assets/images/olive-et-tom/${slug}.png"

            echo "----"
            echo "Character: $japanese"
            echo "Page: $page"


            api="https://captaintsubasa.fandom.com/api.php?action=query&titles=${page}&prop=pageimages&format=json&pithumbsize=600"

            img=$(curl -s -A "journaldegaspard-bot" "$api" \
              | jq -r '.query.pages[].thumbnail.source')


            if [ "$img" = "null" ] || [ -z "$img" ]; then
              echo "No image found"
              return
            fi


            echo "Downloading $filename"

            curl \
              -L \
              -A "journaldegaspard-bot" \
              "$img" \
              -o "$filename"


            file "$filename"

          }


          while read japanese slug
          do
            download "$japanese" "$slug"
            sleep 1
          done < characters.txt


          ls -la assets/images/olive-et-tom


      - name: Commit images
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add assets/images/olive-et-tom

          if git diff --cached --quiet
          then
            echo "Nothing to commit"
          else
            git commit -m "Auto download all Captain Tsubasa portraits"
            git push
          fi
