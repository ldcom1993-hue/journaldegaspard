name: Fetch Captain Tsubasa images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-images:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create image folder
        run: mkdir -p assets/images/olive-et-tom

      - name: Download character portraits from Fandom API
        run: |

          set -e

          download() {

            page="$1"
            filename="$2"

            echo "Fetching portrait for $page"

            api="https://captaintsubasa.fandom.com/api.php?action=query&titles=${page}&prop=pageimages&format=json&pithumbsize=600"

            img=$(curl -s -A "journaldegaspard-bot/1.0" "$api" \
              | grep -o 'https://static.wikia.nocookie.net[^"]*')

            echo "Image URL: $img"

            if [ -z "$img" ]; then
              echo "No image found for $page"
              return
            fi

            curl \
              -L \
              -A "journaldegaspard-bot/1.0" \
              "$img" \
              -o "assets/images/olive-et-tom/$filename"

            file "assets/images/olive-et-tom/$filename"

          }


          download "Tsubasa_Ozora" "olivier-atton.png"
          download "Genzo_Wakabayashi" "thomas-price.png"
          download "Taro_Misaki" "ben-becker.png"
          download "Kojiro_Hyuga" "mark-landers.png"
          download "Ken_Wakashimazu" "ed-warner.png"


          echo "Downloaded files:"
          ls -la assets/images/olive-et-tom


      - name: Commit and push images
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/images/olive-et-tom/

          if git diff --cached --quiet
          then
            echo "No new images to commit"
          else
            git commit -m "Add Captain Tsubasa character portraits"
            git push
          fi
