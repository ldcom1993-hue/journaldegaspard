name: Fetch all character images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create folder
        run: mkdir -p assets/images/olive-et-tom

      - name: Download images
        run: |
          set -euo pipefail

          characters=(
            "Tsubasa Ozora|olivier-atton"
            "Genzo Wakabayashi|thomas-price"
            "Taro Misaki|ben-becker"
            "Kojiro Hyuga|mark-landers"
            "Ken Wakashimazu|ed-warner"
          )

          get_extension() {
            local url="$1"
            local extension

            extension=$(printf '%s' "$url" | sed -E 's/.*\.([A-Za-z0-9]+)(\?.*)?$/\1/' | tr '[:upper:]' '[:lower:]')

            case "$extension" in
              jpg|jpeg|png|webp|svg)
                printf '%s' "$extension"
                ;;
              *)
                printf 'jpg'
                ;;
            esac
          }

          for entry in "${characters[@]}"; do
            wiki=$(printf '%s' "$entry" | cut -d'|' -f1)
            file=$(printf '%s' "$entry" | cut -d'|' -f2)

            echo "Searching image for: $wiki"

            url=$(curl -fsSL "https://en.wikipedia.org/api/rest_v1/page/summary/$wiki" | jq -r '.originalimage.source // .thumbnail.source // empty')

            if [ -n "$url" ]; then
              extension=$(get_extension "$url")
              output="assets/images/olive-et-tom/$file.$extension"

              echo "Downloading $output"
              curl -fL "$url" -o "$output"
            else
              echo "No image found for $wiki"
            fi
          done

      - name: Show files
        run: ls -la assets/images/olive-et-tom

      - name: Commit and push
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/images/olive-et-tom/

          if git diff --cached --quiet; then
            echo "No image changes to commit"
            exit 0
          fi

          git commit -m "Add character images"
          git push
