name: Build teams graph

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-teams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run sync entities
        run: python scripts/sync_entities.py

      - name: Build validated team graph
        run: python scripts/build_team_graph.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/data/personnages.json
          git add assets/data/equipes.json
          git add assets/data/techniques.json

          git diff --cached --quiet || git commit -m "Update entities data"
          git push
