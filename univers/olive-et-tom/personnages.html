<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Découvrez les personnages de l'univers Olive et Tom."
    />
    <title>Olive et Tom · Personnages</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <style>
      .universe-header {
        padding-block: 0.2rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.28);
      }

      .universe-header .container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        min-height: 2rem;
      }

      .universe-header h1 {
        margin: 0;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: clamp(1rem, 2.3vw, 1.2rem);
        line-height: 1.15;
        text-align: center;
        pointer-events: none;
        white-space: nowrap;
      }

      .universe-header .home-link,
      .universe-header .universe-subtitle {
        margin: 0;
        font-size: 0.85rem;
        line-height: 1;
        white-space: nowrap;
      }

      .universe-header .universe-subtitle {
        opacity: 0.9;
      }


      .universe-header .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        color: inherit;
        opacity: 0.9;
        transition: opacity 0.18s ease;
      }

      .universe-header .home-link:hover {
        opacity: 0.65;
      }

      .universe-header .home-link svg {
        width: 21px;
        height: 21px;
        stroke: currentColor;
        fill: none;
      }

      .characters-toolbar {
        margin-top: 0.75rem;
        padding: 0.55rem 0.65rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 8px 18px rgba(31, 41, 55, 0.06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .characters-filters {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .filter-group {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.8rem;
      }

      .filter-group span {
        font-size: 0.74rem;
        white-space: nowrap;
      }

      .filter-group select,
      .filter-group input {
        width: auto;
        min-height: 2rem;
        padding: 0.35rem 0.55rem;
        border-radius: 10px;
        font-size: 0.84rem;
      }

      .filter-group select {
        min-width: 9rem;
      }

      .filter-group-search input {
        min-width: 12rem;
      }

      .results-count {
        margin: 0;
        font-size: 0.82rem;
      }

      @media (max-width: 640px) {
        .universe-header {
          padding-block: 0.35rem;
        }

        .universe-header .container {
          gap: 0.25rem 0.5rem;
          flex-wrap: wrap;
          justify-content: center;
        }

        .universe-header h1 {
          position: static;
          transform: none;
          width: 100%;
          font-size: 1rem;
          order: -1;
        }

        .universe-header .home-link {
          flex: 1;
        }

        .universe-header .universe-subtitle {
          flex: 1;
          text-align: right;
        }

        .characters-toolbar {
          align-items: flex-start;
          padding: 0.5rem 0.55rem;
        }

        .characters-filters {
          width: 100%;
          gap: 0.45rem;
        }

        .filter-group {
          flex: 1 1 100%;
        }

        .filter-group select,
        .filter-group input {
          min-width: 0;
          width: 100%;
        }

        .results-count {
          width: 100%;
        }

        .universe-header .universe-subtitle {
          font-size: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header universe-header">
      <div class="container">
        <a class="home-link" href="/" aria-label="Accueil">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M4.75 10.6 12 5.4l7.25 5.2M8.2 10.35V18.8h7.6v-8.45"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </a>
        <h1>Olive et Tom</h1>
        <p class="universe-subtitle">Personnages</p>
      </div>
    </header>

    <main>
      <section class="characters" aria-labelledby="characters-title">
        <div class="container">
          <h2 id="characters-title" class="visually-hidden">Liste des personnages</h2>

          <div class="characters-toolbar" role="region" aria-label="Filtres personnages">
            <div class="characters-filters">
              <label class="filter-group" for="filter-position">
                <span>Poste</span>
                <select id="filter-position">
                  <option value="">Tous les postes</option>
                </select>
              </label>

              <label class="filter-group" for="filter-country">
                <span>Pays</span>
                <select id="filter-country">
                  <option value="">Tous les pays</option>
                </select>
              </label>

              <label class="filter-group filter-group-search" for="filter-search">
                <span>Recherche</span>
                <input
                  id="filter-search"
                  type="search"
                  placeholder="Nom, équipe, description…"
                  aria-label="Rechercher un personnage"
                />
              </label>
            </div>
            <p id="results-count" class="results-count" aria-live="polite">0 joueurs affichés</p>
          </div>

          <div id="empty-state" class="empty-state" hidden>
            <p>⚽ Aucun joueur ne correspond à vos critères</p>
            <button id="reset-filters" type="button">Réinitialiser</button>
          </div>

          <div id="characters-grid" class="characters-grid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <template id="character-card-template">
      <article class="character-card">
        <a class="character-link" href="#">
          <div class="character-image-wrap">
            <img class="character-image" src="" alt="" loading="lazy" />
            <span class="character-flag" hidden></span>
          </div>
          <div class="character-content">
            <h3 class="character-name"></h3>
            <p class="character-japanese-name" hidden></p>
            <p class="character-position" hidden></p>
            <p class="character-team" hidden></p>
            <p class="character-description" hidden></p>
          </div>
        </a>
      </article>
    </template>

    <script src="/assets/js/personnages.js" defer></script>
  </body>
</html>
