<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Olive et Tom</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <style>
      .universe-header {
        padding-block: 0.2rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.28);
      }

      .universe-header .container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        min-height: 2rem;
      }

      .universe-header h1 {
        margin: 0;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: clamp(1rem, 2.3vw, 1.2rem);
        line-height: 1.15;
        text-align: center;
        pointer-events: none;
        white-space: nowrap;
      }

      .universe-header .home-link,
      .universe-header .universe-subtitle {
        margin: 0;
        font-size: 0.85rem;
        line-height: 1;
        white-space: nowrap;
      }

      .universe-header .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        color: inherit;
        opacity: 0.9;
        transition: opacity 0.18s ease;
      }

      .universe-header .home-link:hover {
        opacity: 0.65;
      }

      .universe-header .home-link svg {
        width: 21px;
        height: 21px;
        stroke: currentColor;
        fill: none;
      }

      .universe-header .universe-subtitle {
        opacity: 0.9;
        text-align: right;
      }

      @media (max-width: 640px) {
        .universe-header {
          padding-block: 0.35rem;
        }

        .universe-header .container {
          gap: 0.25rem 0.5rem;
          flex-wrap: wrap;
          justify-content: center;
        }

        .universe-header h1 {
          position: static;
          transform: none;
          width: 100%;
          font-size: 1rem;
          order: -1;
        }

        .universe-header .home-link {
          flex: 1;
        }

        .universe-header .universe-subtitle {
          flex: 1;
          font-size: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header universe-header">
      <div class="container">
        <a class="home-link" href="/" aria-label="Accueil">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M4.75 10.6 12 5.4l7.25 5.2M8.2 10.35V18.8h7.6v-8.45"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </a>
        <h1>Olive et Tom</h1>
        <p class="universe-subtitle">Univers</p>
      </div>
    </header>

    <main>
      <section class="projects" aria-label="Sections de l'univers Olive et Tom">
        <div class="container projects-grid">
          <article class="project-card">
            <a href="./personnages.html" class="project-link">
              <div class="project-content">
                <h2 class="project-title">Personnages</h2>
                <p class="project-description">Voir tous les personnages</p>
              </div>
            </a>
          </article>

          <!--
            Pour ajouter de nouvelles sections plus tard, dupliquez le bloc <article class="project-card"> ci-dessus,
            puis adaptez le titre, la description et le lien.
            Exemples de pages à créer :
            - equipes.html
            - techniques.html
            - histoires.html
          -->
        </div>
      </section>
    </main>
  </body>
</html>
