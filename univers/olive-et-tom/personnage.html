<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fiche détaillée d'un personnage d'Olive et Tom." />
    <title>Olive et Tom · Personnage</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <style>


      .universe-header .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        color: inherit;
        opacity: 0.9;
        transition: opacity 0.18s ease;
      }

      .universe-header .home-link:hover {
        opacity: 0.65;
      }

      .universe-header .home-link svg {
        width: 21px;
        height: 21px;
        stroke: currentColor;
        fill: none;
      }

      .character-detail {
        padding: 1rem 0 3rem;
      }

      .character-detail-shell {
        margin-top: 1rem;
        background: rgba(15, 30, 55, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 22px;
        box-shadow:
          0 14px 40px rgba(0, 0, 0, 0.55),
          0 0 30px rgba(110, 193, 255, 0.08);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .character-detail-shell:hover {
        transform: translateY(-4px);
        box-shadow:
          0 18px 50px rgba(0, 0, 0, 0.65),
          0 0 40px rgba(110, 193, 255, 0.12);
      }

      .character-detail-loading,
      .character-detail-not-found {
        padding: 2rem 1.2rem;
        text-align: center;
      }

      .character-detail-loading p,
      .character-detail-not-found p {
        margin: 0;
        font-size: 1rem;
        color: var(--muted-color);
      }

      .character-detail-not-found h2 {
        margin: 0 0 0.55rem;
        font-size: 1.35rem;
      }

      .character-detail-content {
        display: grid;
        gap: 1rem;
        padding: 1.8rem;
      }

      .character-detail-media {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        background: rgba(11, 18, 33, 0.7);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .character-detail-image {
        width: 100%;
        display: block;
        aspect-ratio: 1 / 1;
        object-fit: cover;
      }

      .character-detail-main h2 {
        margin: 0;
        font-size: clamp(1.45rem, 3vw, 2rem);
        color: #ffffff;
      }

      .character-detail-jp {
        margin: 0.35rem 0 0;
        color: #9fb8d6;
        font-size: 0.9rem;
        opacity: 0.9;
      }

      .character-detail-badges {
        margin-top: 0.75rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .character-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: rgba(110, 193, 255, 0.15);
        color: #cfe6ff;
        font-weight: 700;
        font-size: 0.85rem;
        padding: 0.3rem 0.8rem;
      }

      .character-detail-block {
        margin-top: 1rem;
      }

      .character-detail-block h3 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
        color: #ffffff;
      }

      .character-detail-block p,
      .character-detail-block ul {
        margin: 0;
        color: #e6edf7;
        line-height: 1.6;
      }

      .character-detail-block ul {
        padding-left: 0;
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .character-detail-block li {
        background: rgba(110, 193, 255, 0.15);
        border-radius: 999px;
        padding: 0.3rem 0.8rem;
        font-size: 0.85rem;
        color: #cfe6ff;
      }

      .character-infobox {
        margin-top: 0.6rem;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        padding-top: 1rem;
      }

      .character-infobox h3 {
        margin: 0 0 0.75rem;
        font-size: 1rem;
        color: #ffffff;
      }

      .character-infobox-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }

      .infobox-row {
        display: grid;
        grid-template-columns: minmax(120px, 34%) 1fr;
        gap: 0.55rem;
        align-items: start;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        padding: 0.55rem 0.65rem;
      }

      .infobox-key {
        color: #cfe6ff;
        font-weight: 700;
        font-size: 0.88rem;
      }

      .infobox-value {
        color: #9fb8d6;
        font-size: 0.9rem;
        line-height: 1.45;
        word-break: break-word;
      }

      @media (min-width: 860px) {
        .character-detail-content {
          grid-template-columns: minmax(280px, 360px) 1fr;
          gap: 1.15rem;
          padding: 1.8rem;
        }

        .character-infobox-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header universe-header">
      <div class="container">
        <a class="home-link" href="/" aria-label="Accueil">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M4.75 10.6 12 5.4l7.25 5.2M8.2 10.35V18.8h7.6v-8.45"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </a>
        <h1>Olive et Tom</h1>
        <p class="universe-subtitle">Personnage</p>
      </div>
    </header>

    <main>
      <section class="character-detail" aria-labelledby="character-detail-title">
        <div class="container">
          <a class="back-link" href="/univers/olive-et-tom/personnages.html">← Retour à la liste</a>
          <h2 id="character-detail-title" class="visually-hidden">Détail du personnage</h2>

          <article id="character-detail-shell" class="character-detail-shell" aria-live="polite">
            <div id="loading-state" class="character-detail-loading">
              <p>Chargement du personnage…</p>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script>
      const shell = document.querySelector("#character-detail-shell");
      const loadingState = document.querySelector("#loading-state");

      const infoboxLabels = {
        name: "Nom",
        japanese: "Nom japonais",
        romaji: "Romaji",
        alias: "Alias",
        gender: "Genre",
        birthday: "Anniversaire",
        age: "Âge",
        height: "Taille",
        weight: "Poids",
        blood: "Groupe sanguin",
        position: "Poste",
        team: "Équipe actuelle",
        former_team: "Ancienne équipe",
        nationality: "Nationalité",
        status: "Statut",
        occupation: "Occupation"
      };

      const PHYSICAL_ARC_ORDER = ["RT", "BWY", "JBC", "WY", "G23", "RS", "MS", "ES", "KD", "default"];

      function safeText(value) {
        return String(value || "").trim();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function makePlaceholder(name) {
        const initial = safeText(name).charAt(0).toUpperCase() || "?";
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640" role="img" aria-label="Portrait indisponible de ${escapeHtml(name)}">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#16233f"/>
                <stop offset="100%" stop-color="#345da8"/>
              </linearGradient>
            </defs>
            <rect x="14" y="14" width="612" height="612" rx="72" fill="url(#bg)"/>
            <text x="320" y="332" text-anchor="middle" dominant-baseline="middle"
              font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="196" font-weight="800"
              fill="#f5f7ff">${initial}</text>
          </svg>`;

        return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
      }

      function renderNotFound() {
        loadingState.hidden = true;
        shell.innerHTML = `
          <div class="character-detail-not-found">
            <h2>Personnage introuvable</h2>
            <p>Le personnage demandé n'existe pas ou n'est pas disponible.</p>
          </div>
        `;
      }

      function getNameData(character) {
        const nameSplit = character.nameSplit && typeof character.nameSplit === "object"
          ? character.nameSplit
          : null;

        const latinName = safeText(
          nameSplit?.latin ||
          (typeof character.name === "string" ? character.name : "") ||
          (typeof character.name === "object" ? character.name?.latin : "")
        ) || "Personnage";

        const japaneseName = safeText(
          nameSplit?.kanji ||
          character.japaneseName ||
          (typeof character.name === "object" ? character.name?.kanji : "")
        );

        return { latinName, japaneseName };
      }

      function getCharacterValue(character, primaryKey, legacyKey) {
        return safeText(character[primaryKey] || character[legacyKey]);
      }

      function getTeams(character, infobox) {
        const rawTeams = Array.isArray(character.teams)
          ? character.teams
          : Array.isArray(character.equipes)
          ? character.equipes
          : [];

        const teams = rawTeams.map(safeText).filter(Boolean);
        const currentTeam = safeText(infobox.team);
        const formerTeam = safeText(infobox.former_team);

        [currentTeam, formerTeam].forEach((teamName) => {
          if (teamName && !teams.includes(teamName)) {
            teams.push(teamName);
          }
        });

        return { teams, currentTeam, formerTeam };
      }

      function sortArcKeys(keys) {
        return [...keys].sort((left, right) => {
          const leftIndex = PHYSICAL_ARC_ORDER.indexOf(left);
          const rightIndex = PHYSICAL_ARC_ORDER.indexOf(right);
          const normalizedLeft = leftIndex === -1 ? Number.MAX_SAFE_INTEGER : leftIndex;
          const normalizedRight = rightIndex === -1 ? Number.MAX_SAFE_INTEGER : rightIndex;
          if (normalizedLeft !== normalizedRight) {
            return normalizedLeft - normalizedRight;
          }
          return left.localeCompare(right);
        });
      }

      function renderPhysicalSection(title, physical, fieldKey, unit) {
        const arcEntries = Object.entries(physical || {})
          .filter(([, arcData]) => arcData && Number.isFinite(Number(arcData[fieldKey])));

        if (!arcEntries.length) {
          return "";
        }

        const sortedEntries = sortArcKeys(arcEntries.map(([arc]) => arc)).map((arc) => {
          const matchingEntry = arcEntries.find(([entryArc]) => entryArc === arc);
          if (!matchingEntry) {
            return "";
          }

          const value = Number(matchingEntry[1][fieldKey]);
          const arcLabel = arc === "default" ? "Valeur" : arc;
          return `<p>${escapeHtml(arcLabel)} : ${escapeHtml(String(value))} ${unit}</p>`;
        }).join("");

        if (!sortedEntries) {
          return "";
        }

        return `
          <div class="character-detail-block">
            <h3>${escapeHtml(title)}</h3>
            ${sortedEntries}
          </div>
        `;
      }

      function buildInfoboxRows(infobox) {
        return Object.entries(infoboxLabels)
          .map(([key, label]) => {
            const value = safeText(infobox[key]);
            if (!value) {
              return "";
            }

            return `
              <div class="infobox-row">
                <div class="infobox-key">${escapeHtml(label)}</div>
                <div class="infobox-value">${escapeHtml(value)}</div>
              </div>
            `;
          })
          .filter(Boolean)
          .join("");
      }

      function renderCharacter(character) {
        loadingState.hidden = true;

        const infobox = character.infobox && typeof character.infobox === "object" ? character.infobox : {};
        const { latinName, japaneseName } = getNameData(character);
        const position = getCharacterValue(character, "position", "poste");
        const nationality = getCharacterValue(character, "nationality", "nationalite");
        const description = safeText(character.description);
        const physical = character.physical && typeof character.physical === "object" ? character.physical : {};
        const { teams } = getTeams(character, infobox);
        const imageSrc = safeText(character.image) || makePlaceholder(latinName);

        const infoboxRows = buildInfoboxRows(infobox);
        const heightSection = renderPhysicalSection("Taille", physical, "height_cm", "cm");
        const weightSection = renderPhysicalSection("Poids", physical, "weight_kg", "kg");

        const teamsMarkup = teams.length
          ? `<ul>${teams.map((team) => `<li>${escapeHtml(team)}</li>`).join("")}</ul>`
          : "<p>Non renseigné</p>";

        shell.innerHTML = `
          <div class="character-detail-content">
            <figure class="character-detail-media">
              <img class="character-detail-image" src="${escapeHtml(imageSrc)}" alt="Portrait de ${escapeHtml(latinName)}" />
            </figure>

            <div class="character-detail-main">
              <h2>${escapeHtml(latinName)}</h2>
              ${japaneseName ? `<p class="character-detail-jp">${escapeHtml(japaneseName)}</p>` : ""}

              <div class="character-detail-badges">
                ${position ? `<span class="character-badge">${escapeHtml(position)}</span>` : ""}
                ${nationality ? `<span class="character-badge">${escapeHtml(nationality)}</span>` : ""}
              </div>

              <div class="character-detail-block">
                <h3>Équipes (actuelle + anciennes)</h3>
                ${teamsMarkup}
              </div>

              ${heightSection}
              ${weightSection}

              <div class="character-detail-block">
                <h3>Description</h3>
                <p>${description ? escapeHtml(description) : "Aucune description disponible."}</p>
              </div>

              <section class="character-infobox" aria-label="Infobox complète">
                <h3>Informations complémentaires</h3>
                <div class="character-infobox-grid">
                  ${infoboxRows || '<p class="infobox-value">Aucune information supplémentaire disponible.</p>'}
                </div>
              </section>
            </div>
          </div>
        `;

        document.title = `Olive et Tom · ${latinName}`;

        const renderedImage = shell.querySelector(".character-detail-image");
        if (renderedImage) {
          renderedImage.addEventListener("error", () => {
            renderedImage.src = makePlaceholder(latinName);
          }, { once: true });
        }
      }

      async function init() {
        const params = new URLSearchParams(window.location.search);
        const slug = safeText(params.get("slug"));

        if (!slug) {
          renderNotFound();
          return;
        }

        try {
          const response = await fetch("/assets/data/personnages.json");

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          const characters = Array.isArray(data) ? data : [];
          const character = characters.find((entry) => safeText(entry.slug) === slug);

          if (!character) {
            renderNotFound();
            return;
          }

          renderCharacter(character);
        } catch (error) {
          console.error("Impossible de charger le personnage:", error);
          renderNotFound();
        }
      }

      init();
    </script>

  </body>
</html>
