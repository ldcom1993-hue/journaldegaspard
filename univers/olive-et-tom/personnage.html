<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fiche détaillée d'un personnage d'Olive et Tom." />
    <title>Olive et Tom · Personnage</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <style>


      .universe-header .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        color: inherit;
        opacity: 0.9;
        transition: opacity 0.18s ease;
      }

      .universe-header .home-link:hover {
        opacity: 0.65;
      }

      .universe-header .home-link svg {
        width: 21px;
        height: 21px;
        stroke: currentColor;
        fill: none;
      }

      .character-detail {
        padding: 1rem 0 3rem;
      }

      .character-detail-shell {
        margin-top: 1rem;
        background: rgba(15, 30, 55, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 22px;
        box-shadow:
          0 14px 40px rgba(0, 0, 0, 0.55),
          0 0 30px rgba(110, 193, 255, 0.08);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .character-detail-shell:hover {
        transform: translateY(-4px);
        box-shadow:
          0 18px 50px rgba(0, 0, 0, 0.65),
          0 0 40px rgba(110, 193, 255, 0.12);
      }

      .character-detail-loading,
      .character-detail-not-found {
        padding: 2rem 1.2rem;
        text-align: center;
      }

      .character-detail-loading p,
      .character-detail-not-found p {
        margin: 0;
        font-size: 1rem;
        color: var(--muted-color);
      }

      .character-detail-not-found h2 {
        margin: 0 0 0.55rem;
        font-size: 1.35rem;
      }

      .character-detail-content {
        display: grid;
        gap: 1rem;
        padding: 1.8rem;
      }

      .character-detail-media {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        background: rgba(11, 18, 33, 0.7);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .character-detail-image {
        width: 100%;
        display: block;
        aspect-ratio: 1 / 1;
        object-fit: cover;
      }

      .character-detail-main h2 {
        margin: 0;
        font-size: clamp(1.45rem, 3vw, 2rem);
        color: #ffffff;
      }

      .character-detail-jp {
        margin: 0.35rem 0 0;
        color: #9fb8d6;
        font-size: 0.9rem;
        opacity: 0.9;
      }

      .character-detail-badges {
        margin-top: 0.75rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .character-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: rgba(110, 193, 255, 0.15);
        color: #cfe6ff;
        font-weight: 700;
        font-size: 0.85rem;
        padding: 0.3rem 0.8rem;
      }

      .character-detail-block {
        margin-top: 1rem;
      }

      .character-detail-block h3 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
        color: #ffffff;
      }

      .character-detail-block p,
      .character-detail-block ul {
        margin: 0;
        color: #e6edf7;
        line-height: 1.6;
      }

      .character-detail-block ul {
        padding-left: 0;
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .character-detail-block li {
        background: rgba(110, 193, 255, 0.15);
        border-radius: 999px;
        padding: 0.3rem 0.8rem;
        font-size: 0.85rem;
        color: #cfe6ff;
      }

      .detail-cards-grid {
        margin-top: 1.1rem;
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.8rem;
      }

      .detail-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 14px;
        padding: 0.8rem 0.9rem;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.34);
      }

      .detail-card h3 {
        margin: 0 0 0.55rem;
        font-size: 0.95rem;
        color: #ffffff;
      }

      .detail-card-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0.45rem;
      }

      .detail-card-list li {
        color: #e6edf7;
        line-height: 1.5;
      }

      .detail-card-list li strong {
        color: #cfe6ff;
      }

      .character-detail-kanji-muted {
        color: #9fb8d6;
        font-size: 0.88rem;
      }

      .fandom-details {
        margin-top: 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        padding-top: 0.8rem;
      }

      .fandom-details summary {
        cursor: pointer;
        color: #cfe6ff;
        font-weight: 700;
        margin-bottom: 0.7rem;
      }

      .character-infobox {
        margin-top: 0.6rem;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        padding-top: 1rem;
      }

      .character-infobox h3 {
        margin: 0 0 0.75rem;
        font-size: 1rem;
        color: #ffffff;
      }

      .character-infobox-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }

      .infobox-row {
        display: grid;
        grid-template-columns: minmax(120px, 34%) 1fr;
        gap: 0.55rem;
        align-items: start;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        padding: 0.55rem 0.65rem;
      }

      .infobox-key {
        color: #cfe6ff;
        font-weight: 700;
        font-size: 0.88rem;
      }

      .infobox-value {
        color: #9fb8d6;
        font-size: 0.9rem;
        line-height: 1.45;
        word-break: break-word;
      }

      @media (min-width: 860px) {
        .character-detail-content {
          grid-template-columns: minmax(280px, 360px) 1fr;
          gap: 1.15rem;
          padding: 1.8rem;
        }

        .character-infobox-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .detail-cards-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header universe-header">
      <div class="container">
        <a class="home-link" href="/" aria-label="Accueil">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M4.75 10.6 12 5.4l7.25 5.2M8.2 10.35V18.8h7.6v-8.45"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </a>
        <h1>Olive et Tom</h1>
        <p class="universe-subtitle">Personnage</p>
      </div>
    </header>

    <main>
      <section class="character-detail" aria-labelledby="character-detail-title">
        <div class="container">
          <a class="back-link" href="/univers/olive-et-tom/personnages.html">← Retour à la liste</a>
          <h2 id="character-detail-title" class="visually-hidden">Détail du personnage</h2>

          <article id="character-detail-shell" class="character-detail-shell" aria-live="polite">
            <div id="loading-state" class="character-detail-loading">
              <p>Chargement du personnage…</p>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script>
      const shell = document.querySelector("#character-detail-shell");
      const loadingState = document.querySelector("#loading-state");

      const infoboxLabels = {
        name: "Nom",
        japanese: "Nom japonais",
        romaji: "Romaji",
        alias: "Alias",
        gender: "Genre",
        birthday: "Anniversaire",
        age: "Âge",
        height: "Taille",
        weight: "Poids",
        blood: "Groupe sanguin",
        position: "Poste",
        team: "Équipe actuelle",
        former_team: "Ancienne équipe",
        nationality: "Nationalité",
        status: "Statut",
        occupation: "Occupation"
      };

      const PHYSICAL_ARC_ORDER = ["RT", "BWY", "JBC", "WY", "G23", "RS", "MS", "ES", "KD", "default"];

      function safeText(value) {
        return String(value || "").trim();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function makePlaceholder(name) {
        const initial = safeText(name).charAt(0).toUpperCase() || "?";
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640" role="img" aria-label="Portrait indisponible de ${escapeHtml(name)}">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#16233f"/>
                <stop offset="100%" stop-color="#345da8"/>
              </linearGradient>
            </defs>
            <rect x="14" y="14" width="612" height="612" rx="72" fill="url(#bg)"/>
            <text x="320" y="332" text-anchor="middle" dominant-baseline="middle"
              font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="196" font-weight="800"
              fill="#f5f7ff">${initial}</text>
          </svg>`;

        return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
      }

      function renderNotFound() {
        loadingState.hidden = true;
        shell.innerHTML = `
          <div class="character-detail-not-found">
            <h2>Personnage introuvable</h2>
            <p>Le personnage demandé n'existe pas ou n'est pas disponible.</p>
          </div>
        `;
      }

      function getNameData(character) {
        const latinName = safeText(
          (typeof character.name === "object" && character.name ? character.name.latin : "") ||
          (typeof character.name === "string" ? character.name : "") ||
          character.nameSplit?.latin
        ) || "Personnage";

        const kanjiName = safeText(
          (typeof character.name === "object" && character.name ? character.name.kanji : "") ||
          character.japaneseName ||
          character.nameSplit?.kanji
        );

        return { latinName, kanjiName };
      }

      function normalizePositionForDetail(rawPosition) {
        const key = safeText(rawPosition).toLowerCase();

        if (!key || key === "unknown") {
          return "Autre";
        }

        if (key.includes("goalkeeper")) {
          return "Goalkeeper";
        }

        if (key.includes("defender")) {
          return "Defender";
        }

        if (key.includes("midfielder")) {
          return "Midfielder";
        }

        if (key.includes("forward")) {
          return "Forward";
        }

        return "Autre";
      }

      function positionUiLabel(position) {
        const map = {
          Goalkeeper: "Gardien",
          Defender: "Défenseur",
          Midfielder: "Milieu",
          Forward: "Attaquant",
          Autre: "Autre"
        };

        return map[position] || "Autre";
      }

      function getCharacterValue(character, primaryKey, legacyKey) {
        return safeText(character[primaryKey] || character[legacyKey]);
      }

      function getTeams(character) {
        const currentTeams = Array.isArray(character.equipes) ? character.equipes : [];
        const formerTeams = Array.isArray(character.anciennes_equipes) ? character.anciennes_equipes : [];
        const legacyTeams = Array.isArray(character.teams) ? character.teams : [];
        const allTeams = [...currentTeams, ...formerTeams, ...legacyTeams].map(safeText).filter(Boolean);

        return allTeams.filter((team, index) => allTeams.indexOf(team) === index);
      }

      function sortArcKeys(keys) {
        return [...keys].sort((left, right) => {
          const leftIndex = PHYSICAL_ARC_ORDER.indexOf(left);
          const rightIndex = PHYSICAL_ARC_ORDER.indexOf(right);
          const normalizedLeft = leftIndex === -1 ? Number.MAX_SAFE_INTEGER : leftIndex;
          const normalizedRight = rightIndex === -1 ? Number.MAX_SAFE_INTEGER : rightIndex;
          if (normalizedLeft !== normalizedRight) {
            return normalizedLeft - normalizedRight;
          }
          return left.localeCompare(right);
        });
      }

      function renderPhysicalRows(physical) {
        const rows = sortArcKeys(Object.keys(physical || {})).map((arc) => {
          const arcData = physical?.[arc] || {};
          const height = Number.isFinite(Number(arcData.height_cm)) ? `${Number(arcData.height_cm)} cm` : "";
          const weight = Number.isFinite(Number(arcData.weight_kg)) ? `${Number(arcData.weight_kg)} kg` : "";

          if (!height && !weight) {
            return "";
          }

          const arcLabel = arc === "default" ? "Valeur" : arc;
          return `<li><strong>${escapeHtml(arcLabel)}</strong> · ${[height, weight].filter(Boolean).join(" · ")}</li>`;
        }).filter(Boolean);

        return rows.length ? rows.join("") : '<li>Non renseigné</li>';
      }

      function buildInfoboxRows(infobox) {
        const hiddenInfoboxKeys = new Set(["height", "weight", "team", "former_team", "name"]);

        return Object.entries(infoboxLabels)
          .map(([key, label]) => {
            if (hiddenInfoboxKeys.has(key)) {
              return "";
            }

            const value = safeText(infobox[key]);
            if (!value || value.toLowerCase().includes("click \"expand\" to view")) {
              return "";
            }

            return `
              <div class="infobox-row">
                <div class="infobox-key">${escapeHtml(label)}</div>
                <div class="infobox-value">${escapeHtml(value)}</div>
              </div>
            `;
          })
          .filter(Boolean)
          .join("");
      }

      function renderCharacter(character) {
        loadingState.hidden = true;

        const infobox = character.infobox && typeof character.infobox === "object" ? character.infobox : {};
        const { latinName, kanjiName } = getNameData(character);
        const rawPosition = safeText(character.poste || character.position);
        const normalizedPosition = normalizePositionForDetail(rawPosition);
        const positionLabel = positionUiLabel(normalizedPosition);
        const nationality = getCharacterValue(character, "nationalite", "nationality");
        const description = safeText(character.description);
        const physical = character.physical && typeof character.physical === "object" ? character.physical : {};
        const teams = getTeams(character);
        const imageSrc = safeText(character.image) || makePlaceholder(latinName);

        const infoboxRows = buildInfoboxRows(infobox);
        const physicalRows = renderPhysicalRows(physical);

        const teamsMarkup = teams.length ? teams.map((team) => `<li>${escapeHtml(team)}</li>`).join("") : "<li>Non renseigné</li>";

        shell.innerHTML = `
          <div class="character-detail-content">
            <figure class="character-detail-media">
              <img class="character-detail-image" src="${escapeHtml(imageSrc)}" alt="Portrait de ${escapeHtml(latinName)}" />
            </figure>

            <div class="character-detail-main">
              <h2>${escapeHtml(latinName)}</h2>
              ${kanjiName ? `<p class="character-detail-jp">${escapeHtml(kanjiName)}</p>` : ""}

              <div class="character-detail-badges">
                <span class="character-badge">${escapeHtml(positionLabel)}</span>
                ${nationality ? `<span class="character-badge">${escapeHtml(nationality)}</span>` : ""}
              </div>

              <section class="detail-cards-grid" aria-label="Informations personnage">
                <article class="detail-card">
                  <h3>Identité</h3>
                  <ul class="detail-card-list">
                    <li><strong>Nom</strong> · ${escapeHtml(latinName)}</li>
                    ${kanjiName ? `<li><strong>Nom kanji</strong> · <span class="character-detail-kanji-muted">${escapeHtml(kanjiName)}</span></li>` : ""}
                    <li><strong>Nationalité</strong> · ${nationality ? escapeHtml(nationality) : "Non renseignée"}</li>
                    <li><strong>Poste</strong> · ${escapeHtml(positionLabel)}</li>
                  </ul>
                </article>

                <article class="detail-card">
                  <h3>Équipes</h3>
                  <ul class="detail-card-list">${teamsMarkup}</ul>
                </article>

                <article class="detail-card">
                  <h3>Physique</h3>
                  <ul class="detail-card-list">${physicalRows}</ul>
                </article>

                <article class="detail-card">
                  <h3>Description</h3>
                  <p>${description ? escapeHtml(description) : "Aucune description disponible."}</p>
                </article>
              </section>

              ${infoboxRows ? `
                <details class="fandom-details">
                  <summary>Détails (Fandom)</summary>
                  <section class="character-infobox" aria-label="Infobox complète">
                    <div class="character-infobox-grid">${infoboxRows}</div>
                  </section>
                </details>
              ` : ""}
            </div>
          </div>
        `;

        document.title = `Olive et Tom · ${latinName}`;

        const renderedImage = shell.querySelector(".character-detail-image");
        if (renderedImage) {
          renderedImage.addEventListener("error", () => {
            renderedImage.src = makePlaceholder(latinName);
          }, { once: true });
        }
      }

      async function init() {
        const params = new URLSearchParams(window.location.search);
        const slug = safeText(params.get("slug"));

        if (!slug) {
          renderNotFound();
          return;
        }

        try {
          const response = await fetch("/assets/data/personnages.json");

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          const characters = Array.isArray(data) ? data : [];
          const character = characters.find((entry) => safeText(entry.slug) === slug);

          if (!character) {
            renderNotFound();
            return;
          }

          renderCharacter(character);
        } catch (error) {
          console.error("Impossible de charger le personnage:", error);
          renderNotFound();
        }
      }

      init();
    </script>

  </body>
</html>
